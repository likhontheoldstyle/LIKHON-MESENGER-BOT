name: Node.js Continuous Loop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Manual trigger er jonno
  repository_dispatch:
    types: [restart_workflow] # Custom trigger event

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - run: npm install

    # Ekhane script-ti 5 ghonta 58 minute cholbe
    - name: Run for 5 hours 58 minutes
      timeout-minutes: 360 # GitHub max limit 6 hours
      run: |
        npm start & 
        sleep 21480 # (5*3600 + 58*60) = 21,480 seconds
        kill $! || true

    # Action sesh hobar thik agey nijei nijeke trigger korbe
    - name: Trigger Next Action
      if: always() # Script fail korleo jeno restart hoy
      run: |
        curl -X POST \
        -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/${{ github.repository }}/dispatches \
        -d '{"event_type": "restart_workflow"}'
